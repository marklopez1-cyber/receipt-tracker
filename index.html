<title>ReceiptTrack</title>

<style>
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  :root {
    --bg:#f7f6f2; --surface:#fff; --surface2:#f0ede6;
    --text:#1a1a18; --text2:#6b6b65; --text3:#9b9b95;
    --accent:#2d5a27; --accent-light:#e8f0e7; --accent-mid:#4a8a42;
    --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.14);
    --danger:#c0392b; --info:#185fa5;
    --fuel:#d4750a; --supplies:#185fa5; --equipment:#6b3fa0; --meals:#c0392b; --other:#5f5e5a;
    --fuel-bg:#faeeda; --supplies-bg:#e6f1fb; --equipment-bg:#f0ebfa; --meals-bg:#fcebeb; --other-bg:#f1efe8;
    --r:10px; --rs:6px;
    --sat:env(safe-area-inset-top); --sab:env(safe-area-inset-bottom);
    font-family:Georgia,serif;
  }
  body { background:var(--bg); color:var(--text); min-height:100vh; overscroll-behavior:none; }
  .app { max-width:480px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; }
  .header { background:var(--accent); color:white; padding:14px 16px 12px; padding-top:calc(14px + var(--sat)); position:sticky; top:0; z-index:100; }
  .header-top { display:flex; align-items:center; justify-content:space-between; }
  .logo { font-size:18px; font-weight:700; letter-spacing:-0.5px; }
  .logo small { opacity:.6; font-weight:400; font-size:11px; display:block; }
  .hbtns { display:flex; gap:5px; }
  .hbtn { background:rgba(255,255,255,0.15); border:none; color:white; border-radius:7px; padding:7px 9px; font-size:11px; cursor:pointer; font-family:inherit; }
  .hbtn:active { background:rgba(255,255,255,0.3); }
  .nav { display:flex; background:var(--surface); border-bottom:1px solid var(--border); }
  .ni { flex:1; padding:10px 4px; text-align:center; font-size:10px; color:var(--text2); cursor:pointer; border-bottom:2px solid transparent; font-family:Georgia,serif; }
  .ni.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:600; }
  .ni-icon { font-size:15px; margin-bottom:2px; }
  .content { flex:1; padding:14px; overflow-y:auto; padding-bottom:calc(80px + var(--sab)); -webkit-overflow-scrolling:touch; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-bottom:13px; }
  .card { background:var(--surface); border-radius:var(--r); padding:12px; border:1px solid var(--border); }
  .card.accent { background:var(--accent); }
  .clabel { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:.5px; margin-bottom:3px; }
  .card.accent .clabel { color:rgba(255,255,255,.7); }
  .cval { font-size:20px; font-weight:700; color:var(--text); }
  .card.accent .cval { color:white; }
  .sec { font-size:11px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; margin:13px 0 8px; }
  .catbars { background:var(--surface); border-radius:var(--r); padding:13px; border:1px solid var(--border); margin-bottom:13px; }
  .cr { margin-bottom:10px; } .cr:last-child { margin-bottom:0; }
  .crtop { display:flex; justify-content:space-between; align-items:center; margin-bottom:3px; }
  .crname { font-size:13px; display:flex; align-items:center; gap:5px; }
  .dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .cramount { font-size:13px; font-weight:600; }
  .barbg { height:4px; background:var(--surface2); border-radius:2px; }
  .barfill { height:4px; border-radius:2px; }
  .rc { background:var(--surface); border-radius:var(--r); padding:12px; border:1px solid var(--border); margin-bottom:9px; cursor:pointer; }
  .rc:active { background:var(--surface2); }
  .rctop { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
  .rcname { font-size:15px; font-weight:600; flex:1; }
  .rcamt { font-size:17px; font-weight:700; color:var(--accent); flex-shrink:0; }
  .rcmeta { display:flex; gap:7px; margin-top:5px; align-items:center; flex-wrap:wrap; }
  .rcdate { font-size:11px; color:var(--text3); }
  .badge { font-size:9px; padding:2px 7px; border-radius:20px; font-weight:600; text-transform:uppercase; letter-spacing:.3px; }
  .badge.Fuel { background:var(--fuel-bg); color:var(--fuel); }
  .badge.Supplies { background:var(--supplies-bg); color:var(--info); }
  .badge.Equipment { background:var(--equipment-bg); color:var(--equipment); }
  .badge.Meals { background:var(--meals-bg); color:var(--danger); }
  .badge.Other { background:var(--other-bg); color:var(--other); }
  .rcnotes { font-size:11px; color:var(--text2); margin-top:4px; font-style:italic; }
  .rcphoto { font-size:10px; color:var(--accent); margin-top:3px; }
  .empty { text-align:center; padding:44px 20px; color:var(--text3); }
  .empty-icon { font-size:36px; margin-bottom:10px; }
  .empty-title { font-size:15px; color:var(--text2); margin-bottom:5px; font-weight:600; }
  .empty-sub { font-size:13px; line-height:1.5; }
  .scanarea { background:var(--surface); border-radius:var(--r); border:2px dashed var(--border2); padding:24px 16px; text-align:center; margin-bottom:13px; cursor:pointer; }
  .scanarea:active { background:var(--accent-light); }
  .scan-icon { font-size:28px; margin-bottom:7px; }
  .scan-text { font-size:14px; color:var(--text2); margin-bottom:3px; }
  .scan-sub { font-size:12px; color:var(--text3); }
  .scan-btns { display:flex; gap:10px; margin-top:12px; justify-content:center; }
  .btn { border:none; border-radius:var(--rs); padding:11px 18px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; }
  .btn-p { background:var(--accent); color:white; } .btn-p:active { background:var(--accent-mid); }
  .btn-s { background:var(--surface2); color:var(--text); border:1px solid var(--border2); } .btn-s:active { opacity:.7; }
  .btn-d { background:#fee; color:var(--danger); border:1px solid rgba(192,57,43,.2); }
  .btn-full { width:100%; }
  .btn-save { width:100%; padding:14px; font-size:15px; }
  .preview { width:100%; max-height:200px; object-fit:contain; border-radius:var(--rs); margin-bottom:10px; border:1px solid var(--border); }
  .sb { border-radius:var(--rs); padding:11px 13px; font-size:13px; margin-bottom:12px; display:flex; align-items:flex-start; gap:9px; line-height:1.5; }
  .sb.scanning { background:var(--accent-light); border:1px solid rgba(45,90,39,.25); color:var(--accent); }
  .sb.error { background:#fff0f0; border:1px solid rgba(192,57,43,.25); color:var(--danger); }
  .sb.success { background:#f0fff4; border:1px solid rgba(45,90,39,.25); color:#1a6b2a; }
  .sb.warn { background:#fff8e1; border:1px solid #f0c040; color:#7a5c00; }
  .spinner { width:15px; height:15px; border:2px solid rgba(45,90,39,.3); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; flex-shrink:0; margin-top:2px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .fg { margin-bottom:13px; }
  .fl { font-size:11px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:.4px; margin-bottom:5px; display:block; }
  .fi { width:100%; background:var(--surface); border:1px solid var(--border2); border-radius:var(--rs); padding:11px 12px; font-size:16px; color:var(--text); font-family:inherit; outline:none; -webkit-appearance:none; }
  .fi:focus { border-color:var(--accent); }
  .fsel { width:100%; background:var(--surface); border:1px solid var(--border2); border-radius:var(--rs); padding:11px 12px; font-size:16px; color:var(--text); font-family:inherit; outline:none; -webkit-appearance:none; cursor:pointer; }
  .frow { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:200; display:flex; align-items:flex-end; }
  .modal { background:var(--surface); border-radius:16px 16px 0 0; width:100%; max-height:88vh; overflow-y:auto; padding:18px; padding-bottom:calc(18px + var(--sab)); -webkit-overflow-scrolling:touch; }
  .mhead { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .mtitle { font-size:16px; font-weight:700; }
  .mclose { background:var(--surface2); border:none; width:30px; height:30px; border-radius:50%; font-size:14px; cursor:pointer; }
  .mrow { display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--border); font-size:14px; gap:10px; }
  .mlabel { color:var(--text2); flex-shrink:0; }
  .mval { font-weight:600; text-align:right; }
  .mimg { width:100%; max-height:220px; object-fit:contain; border-radius:var(--rs); margin-bottom:13px; border:1px solid var(--border); }
  .filters { display:flex; gap:7px; overflow-x:auto; padding-bottom:4px; margin-bottom:12px; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  .filters::-webkit-scrollbar { display:none; }
  .chip { white-space:nowrap; padding:7px 13px; border-radius:20px; font-size:12px; font-weight:600; border:1px solid var(--border2); background:var(--surface); color:var(--text2); cursor:pointer; font-family:inherit; }
  .chip.active { background:var(--accent); color:white; border-color:var(--accent); }
  .tbar { background:var(--surface); border-top:1px solid var(--border); padding:12px 16px; padding-bottom:calc(12px + var(--sab)); display:flex; justify-content:space-between; align-items:center; position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; z-index:50; }
  .tlabel { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; }
  .tval { font-size:19px; font-weight:700; color:var(--accent); }
  .divider { height:1px; background:var(--border); margin:13px 0; }
  .keyrow { display:flex; gap:8px; margin-top:10px; }
  .keyrow .fi { flex:1; font-family:monospace; font-size:13px; }
  .bkrow { display:flex; gap:10px; }
  .bkrow .btn-s { flex:1; font-size:13px; padding:10px 8px; }

// ── Inline Service Worker via Blob URL ─────────────────────────────
// This avoids needing a separate sw.js file entirely
const SW_CODE = `
const CACHE = 'receipttrack-v4';
self.addEventListener('install', e => { self.skipWaiting(); });
self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
    ).then(() => self.clients.claim())
  );
});
self.addEventListener('fetch', e => {
  if (e.request.method !== 'GET') return;
  if (e.request.url.includes('api.anthropic.com')) return;
  if (e.request.url.includes('cdnjs.cloudflare.com')) return;
  e.respondWith(
    fetch(e.request)
      .then(resp => {
        if (resp && resp.status === 200 && resp.type === 'basic') {
          caches.open(CACHE).then(c => c.put(e.request, resp.clone()));
        }
        return resp;
      })
      .catch(() => caches.match(e.request))
  );
});
`;

    });
}

async function getSession() {
  const { data: { session } } = await sb.auth.getSession();
  currentUser = session?.user || null;
  return currentUser;
}

async function signUp(email, password) {
  const { data, error } = await sb.auth.signUp({ email, password });
  if (error) throw error;
  currentUser = data.user;
  // Create subscription row for new user
  if (currentUser) {
    await sb.from('subscriptions').upsert({
      user_id: currentUser.id,
      tier: 'free',
      scans_this_month: 0,
      scan_month: new Date().toISOString().slice(0,7)
    });
  }
  return data;
}

async function signIn(email, password) {

  if (error) throw error;
  currentUser = data.user;
  return data;
}

async function loadUserSubscription() {
  if (!currentUser) return;
  const ym = new Date().toISOString().slice(0,7);
  const { data } = await sb.from('subscriptions')
    .select('tier, scans_this_month, scan_month')
    .eq('user_id', currentUser.id)
    .single();
  if (data) {
    userTier = data.tier || 'free';
    // Reset scan count if new month
    scansThisMonth = (data.scan_month === ym) ? (data.scans_this_month || 0) : 0;
    if (data.scan_month !== ym) {
      await sb.from('subscriptions').update({ scans_this_month: 0, scan_month: ym }).eq('user_id', currentUser.id);
    }
  } else {
    // Create subscription row if missing
    await sb.from('subscriptions').upsert({ user_id: currentUser.id, tier: 'free', scans_this_month: 0, scan_month: ym });
    userTier = 'free'; scansThisMonth = 0;
  }
}

async function syncScanCount() {
  if (!currentUser) return;
  const ym = new Date().toISOString().slice(0,7);
  await sb.from('subscriptions')
    .update({ scans_this_month: scansThisMonth, scan_month: ym })
    .eq('user_id', currentUser.id);
}

async function saveReceiptToSupabase(r) {
  if (!currentUser) return;
  const row = {

    user_id: currentUser.id,
    store: r.store || '',
    date: r.date || null,
    amount: r.amount || 0,
    tax: r.tax || null,
    category: r.category || 'Other',
    payment_type: r.paymentType || '',
    card_last4: r.cardLast4 || '',
    card_type: r.cardType || '',
    notes: r.notes || '',
    logo_url: r.logoUrl || null,
    org_id: currentOrg ? currentOrg.id : null,
    submitted_by_email: currentUser.email || null,
    created_at: r.createdAt
  };
  await sb.from('receipts').upsert(row);
}

async function deleteReceiptFromSupabase(id) {

}

async function loadOrg() {
  if (!currentUser) return;
  try {
    const { data: memberRows } = await sb.from('org_members')
      .select('*, organizations(id,name,owner_id)')
      .eq('user_id', currentUser.id).eq('status', 'active').limit(1);
    if (memberRows && memberRows.length > 0) {
      const m = memberRows[0], org = m.organizations;
      currentOrg = { id: org.id, name: org.name, role: org.owner_id === currentUser.id ? 'owner' : m.role };
    }
    if (!currentOrg) {
      const { data: ownedOrgs } = await sb.from('organizations')
        .select('*').eq('owner_id', currentUser.id).limit(1);
      if (ownedOrgs && ownedOrgs.length > 0)
        currentOrg = { id: ownedOrgs[0].id, name: ownedOrgs[0].name, role: 'owner' };
    }
  } catch(e) {
    // Tables may not exist yet — silently ignore
    console.warn('loadOrg:', e.message);
  }
}

function isAdmin() {
  return currentOrg && (currentOrg.role === 'owner' || currentOrg.role === 'admin');
}

async function loadOrgMembers() {
  if (!currentOrg) return;
  try {
    const { data } = await sb.from('org_members').select('*')
      .eq('org_id', currentOrg.id).order('joined_at', { ascending: true });
    orgMembers = data || [];
  } catch(e) { console.warn('loadOrgMembers:', e.message); }
}

async function loadOrgReceipts() {
  if (!currentOrg || !isAdmin()) return;
  try {
    const { data, error } = await sb.from('receipts').select('*')
      .eq('org_id', currentOrg.id).order('created_at', { ascending: false });
    if (!error && data) receipts = data.map(mapRow);
  } catch(e) { console.warn('loadOrgReceipts:', e.message); }
}

async function loadMyReceipts() {
  if (!currentUser) return;
  const { data, error } = await sb.from('receipts')
    .select('*')
    .eq('user_id', currentUser.id)
    .order('created_at', { ascending: false });
  if (!error && data) receipts = data.map(mapRow);
}

function mapRow(row) {
  return {
    id:            row.id,
    store:         row.store || '',
    date:          row.date || '',
    amount:        row.amount || 0,
    tax:           row.tax,
    category:      row.category || 'Other',
    paymentType:   row.payment_type || '',
    cardLast4:     row.card_last4 || '',
    cardType:      row.card_type || '',
    notes:         row.notes || '',
    logoUrl:       row.logo_url || null,
    image:         row.image || null,
    createdAt:     row.created_at,
    orgId:         row.org_id || null,
    submittedBy:   row.submitted_by_email || null,
  };
}

async function createOrg(name) {
  if (!currentUser || !name.trim()) return null;
  try {
    const { data, error } = await sb.from('organizations')
      .insert({ name: name.trim(), owner_id: currentUser.id }).select().single();
    if (error) throw error;
    await sb.from('org_members').insert({
      org_id: data.id, user_id: currentUser.id, email: currentUser.email,
      role: 'owner', status: 'active', joined_at: new Date().toISOString()
    });
    currentOrg = { id: data.id, name: data.name, role: 'owner' };
    return data;
  } catch(e) { alert('Error creating team: ' + e.message); return null; }
}

  ov.innerHTML = '<div class="modal">'

    + '<button class="mclose" onclick="this.closest(\'.overlay\').remove()">✕</button></div>'

    + 'Invite saved for <strong>' + email + '</strong>.<br>' + (timedOut ? 'Email server is starting up — it may take a minute. ' : 'Email could not be sent. ') + 'Share this link directly in the meantime:</div>'
    + '<div style="background:#f0f9f0;border:1px solid var(--accent);border-radius:var(--rs);padding:11px 13px;font-size:12px;word-break:break-all;color:var(--accent);margin-bottom:14px">' + link + '</div>'
    + '<button class="btn btn-p btn-full" style="padding:12px" id="copy-invite-btn">📋 Copy Link</button>'
    + '<button class="btn btn-s btn-full" style="padding:10px;margin-top:8px" onclick="this.closest(\'.overlay\').remove();showOrgManagement()">Done</button>'
    + '</div>';
  ov.onclick = e => { if (e.target === ov) { ov.remove(); showOrgManagement(); } };
  document.body.appendChild(ov);
  document.getElementById('copy-invite-btn').onclick = function() {
    navigator.clipboard.writeText(link).then(() => {

      setTimeout(() => { this.textContent = '📋 Copy Link'; }, 2000);

  };

      </div>
      <a href="${inviteUrl}" style="display:block;background:#2d5a27;color:white;text-align:center;padding:14px 24px;border-radius:8px;text-decoration:none;font-weight:700;font-size:16px;margin-bottom:20px">
        Accept Invitation →
      </a>
      <p style="color:#888;font-size:12px;text-align:center;line-height:1.6">
        This link will take you to ReceiptTrack where you can sign up or log in to accept.<br>
        If you weren't expecting this, you can safely ignore this email.
      </p>
    </div>`;

  try {
    // Call Railway relay (handles CORS for Resend API)
    const fnUrl = 'https://receipt-invite-production.up.railway.app/send-invite';
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 8000); // 8s timeout
    const res = await fetch(fnUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email,
        orgId:        currentOrg.id,
        orgName:      currentOrg.name,
        inviterEmail: currentUser.email
      }),
      signal: controller.signal
    });
    clearTimeout(timeout);
    const result = await res.json();
    if (!res.ok) throw new Error(result.error || 'Email failed');
  } catch(e) {
    const isTimeout = e.name === 'AbortError';
    console.warn('Email error:', isTimeout ? 'Request timed out' : e.message);
    try { await navigator.clipboard.writeText(inviteUrl); } catch(_) {}
    await loadOrgMembers();
    showInviteFallback(email, inviteUrl, isTimeout);
    return true;
  }

  await loadOrgMembers();
  return true;
}

async function updateMemberRole(memberId, newRole) {
  if (!currentOrg || currentOrg.role !== 'owner') return;
  await sb.from('org_members').update({ role: newRole }).eq('id', memberId);
  await loadOrgMembers();
}

async function removeMember(memberId) {
  if (!currentOrg || !isAdmin()) return;
  const m = orgMembers.find(x => x.id === memberId);
  if (m && m.role === 'owner') { alert("Can't remove the team owner."); return; }
  if (!confirm('Remove this member from your team?')) return;
  await sb.from('org_members').delete().eq('id', memberId);
  await loadOrgMembers();
}

async function acceptInvite(orgId) {
  if (!currentUser || !orgId) return;
  try {
    const { data } = await sb.from('org_members').select('*')
      .eq('org_id', orgId).eq('email', currentUser.email).eq('status', 'invited').single();
    if (!data) return;
    await sb.from('org_members').update({
      user_id: currentUser.id, status: 'active', joined_at: new Date().toISOString()
    }).eq('id', data.id);
    await loadOrg();
  } catch(e) { console.warn('acceptInvite:', e.message); }
}

async function handlePasswordReset() {
  const newPass    = document.getElementById('new-password')?.value;
  const confirmPass= document.getElementById('confirm-password')?.value;
  if (!newPass || newPass.length < 6) { showAuthError('Password must be at least 6 characters.'); return; }
  if (newPass !== confirmPass) { showAuthError('Passwords do not match.'); return; }
  const btn = document.querySelector('#auth-screen .btn-p');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
  const { error } = await sb.auth.updateUser({ password: newPass });
  if (error) {
    if (btn) { btn.disabled = false; btn.textContent = 'Set New Password'; }
    showAuthError(error.message || 'Failed to update password. Please try again.');
    return;
  }
  // Clear hash and go to login
  window.location.hash = '';
  await sb.auth.signOut();
  const authEl = document.getElementById('auth-screen');
  if (authEl) authEl.remove();
  document.getElementById('app').classList.add('hidden');
  showAuthScreen('login');
  setTimeout(() => showAuthError('✓ Password updated! Please sign in with your new password.'), 100);
}

async function handleForgotPassword() {
  const email = document.getElementById('auth-email')?.value?.trim();
  if (!email) { showAuthError('Please enter your email address first.'); return; }
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: 'https://receipts.appdepot.net'
  });
  if (error) { showAuthError(error.message); return; }
  showAuthError('✓ Password reset email sent! Check your inbox.');
}

async function handleAuth(mode) {
  const email    = document.getElementById('auth-email')?.value?.trim();
  const password = document.getElementById('auth-password')?.value;
  const confirm  = document.getElementById('auth-confirm')?.value;
  const errEl    = document.getElementById('auth-error');
  const btn      = document.getElementById('auth-btn');

  if (!email || !password) { showAuthError('Please enter your email and password.'); return; }
  if (mode === 'signup' && password !== confirm) { showAuthError('Passwords do not match.'); return; }
  if (password.length < 6) { showAuthError('Password must be at least 6 characters.'); return; }

  btn.disabled = true;
  btn.textContent = mode === 'login' ? 'Signing in…' : 'Creating account…';

  try {
    if (mode === 'signup') await signUp(email, password);
    else await signIn(email, password);
    await onAuthSuccess();
  } catch(err) {
    btn.disabled = false;
    btn.textContent = mode === 'login' ? 'Sign In' : 'Create Account';
    showAuthError(err.message || 'Authentication failed. Please try again.');
  }
}

const DB_NAME='ReceiptTrackDB', DB_VER=1;
let db=null;
function openDB() {
  return new Promise((res,rej) => {
    const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('receipts')) d.createObjectStore('receipts',{keyPath:'id'});
      if(!d.objectStoreNames.contains('settings')) d.createObjectStore('settings',{keyPath:'key'});
    };
    r.onsuccess=e=>{db=e.target.result;res(db);};
    r.onerror=e=>rej(e.target.error);
  });
}
const txs  = (s,m='readonly') => db.transaction(s,m).objectStore(s);

const dbDel = (s,k) => new Promise((res,rej)=>{const r=txs(s,'readwrite').delete(k);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});
const dbGet = (s,k) => new Promise(res=>{const r=txs(s).get(k);r.onsuccess=()=>res(r.result?.value??null);r.onerror=()=>res(null);});

    autozone:'autozone.com', oreilly:'oreillyauto.com', napa:'napaonline.com',
    grainger:'grainger.com', fastenal:'fastenal.com', menards:'menards.com',
    tractorsupply:'tractorsupply.com', acehardware:'acehardware.com',

  var sz = size, r4 = Math.round(size/4), sz2 = Math.round(size/2);
  if (!r.logoUrl) {
    return '<div style="width:' + sz + 'px;height:' + sz + 'px;border-radius:' + r4 + 'px;background:' + color + ';display:flex;align-items:center;justify-content:center;font-size:' + sz2 + 'px;font-weight:700;color:white;flex-shrink:0;font-family:sans-serif">' + letter + '</div>';
  }
  return '<img data-logo="1" src="' + r.logoUrl + '" width="' + sz + '" height="' + sz + '" style="border-radius:' + r4 + 'px;object-fit:contain;background:white;border:1px solid var(--border);flex-shrink:0">';
}

async function attachLogos(rList) {
  // Process in small batches to avoid blocking UI
  // Re-fetch logo for ANY receipt missing a logoUrl regardless of whether it was scanned before
  const missing = rList.filter(r => r.store && !r.logoUrl);
  if (missing.length === 0) return;

  for (const r of missing) {
    try {
      const url = await fetchMerchantLogo(r.store);
      if (url) {
        r.logoUrl = url;
        // Save to IndexedDB
        try { await dbPut('receipts', r); } catch(e) {}
        // Save to Supabase so it persists across devices
        try { await saveReceiptToSupabase(r); } catch(e) {}
        // Re-render so logo appears immediately as each one loads
        render();
      }
    } catch(e) {}
    // Small delay between fetches to avoid hammering APIs
    await new Promise(res => setTimeout(res, 300));
  }
}

async function refreshAllLogos() {
  // Force re-fetch logos for ALL receipts including ones that previously failed
  const toRefresh = receipts.filter(r => r.store);
  for (const r of toRefresh) {
    // Clear cached result so it tries again
    const key = r.store.trim().toLowerCase();
    delete logoCache[key];
    r.logoUrl = null;
  }
  await attachLogos(toRefresh);
}

// ── Init ───────────────────────────────────────────────────────────
async function init() {
  // Initialize Supabase client
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Register service worker
  if ('serviceWorker' in navigator) {
    const swBlob = new Blob([SW_CODE], {type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(swBlob), {scope:'/'}).catch(()=>{});
  }

  // Load local settings (API key)
  try {
    await openDB();
    apiKey = (await dbGet('settings','apiKey')) || '';
  } catch(e) {
    apiKey = localStorage.getItem('rt_apikey')||'';
  }

  // Check if this is a password recovery redirect from email link
  // Supabase puts #access_token=...&type=recovery in the URL hash
  const hash = window.location.hash;
  if (hash && hash.includes('type=recovery')) {
    // Exchange the token so user is temporarily signed in for password reset
    const { data, error } = await sb.auth.getSession();
    document.getElementById('app').classList.add('hidden');
    showPasswordResetScreen();
    return;
  }

  // Check if this is an email confirmation redirect
  if (hash && hash.includes('type=signup')) {
    // Auto confirm and sign in
    await sb.auth.getSession();
    window.location.hash = '';
  }

  // Check Supabase auth session
  const user = await getSession();
  if (!user) {
    document.getElementById('app').classList.add('hidden');
    showAuthScreen('login');
  } else {
    await onAuthSuccess();
  }
}

async function getScansThisMonth() {
  const ym = new Date().toISOString().slice(0,7);
  const stored = await dbGet('settings','scanMonth');
  if (stored && stored.month === ym) return stored.count;
  // New month — reset
  await dbPut('settings',{key:'scanMonth',value:{month:ym,count:0}});
  return 0;
}

async function incrementScanCount() {
  const ym = new Date().toISOString().slice(0,7);
  scansThisMonth++;
  await dbPut('settings',{key:'scanMonth',value:{month:ym,count:scansThisMonth}});
  // Sync to Supabase so count is enforced server-side per user
  syncScanCount();
}

function scansRemaining() {
  const limit = TIERS[userTier].scansPerMonth;
  return Math.max(0, limit - scansThisMonth);
}

function canScan() {
  if (userTier !== 'free') return true;
  return scansThisMonth < TIERS.free.scansPerMonth;
}

function canAddReceipt() {
  if (userTier !== 'free') return true;
  return receipts.length < TIERS.free.maxReceipts;
}

async function setTier(tier) {
  userTier = tier;
  await dbPut('settings', { key:'userTier', value:tier });
}

async function persistReceipt(r) {
  receipts.unshift(r);
  // Save to Supabase (cloud) and IndexedDB (local cache)
  await saveReceiptToSupabase(r);
  try { await dbPut('receipts',r); } catch(e) { lsFallback(); }
  lsBak();
  // Fetch logo in background after saving
  if (r.store) {
    fetchMerchantLogo(r.store).then(async url => {
      if (url) {
        r.logoUrl=url;
        await saveReceiptToSupabase(r);
        try { dbPut('receipts',r); } catch(e){}
        render();
      }
    });
  }
}
async function removeReceipt(id) {
  receipts=receipts.filter(r=>r.id!==id);
  await deleteReceiptFromSupabase(id);
  try { await dbDel('receipts',id); } catch(e) { lsFallback(); }
  lsBak();
}
async function storeKey(key) {
  apiKey=key;
  try { key ? await dbPut('settings',{key:'apiKey',value:key}) : await dbDel('settings','apiKey'); } catch(e) {}
  localStorage.setItem('rt_apikey_bak',key);
}
function lsFallback() { localStorage.setItem('rt_receipts',JSON.stringify(receipts)); }
function lsBak() { try { localStorage.setItem('rt_receipts_bak',JSON.stringify(receipts.map(r=>({...r,image:null})))); } catch(e){} }

// ── File & Camera ──────────────────────────────────────────────────
function openPicker(capture) {
  const fi=document.getElementById('file-input');
  capture?fi.setAttribute('capture',capture):fi.removeAttribute('capture');
  fi.click();
}
function onFileSelect(e) {
  const file=e.target.files[0]; if(!file) return;
  if(!file.type.startsWith('image/')){alert('Please select an image file.');return;}
  const reader=new FileReader();
  reader.onload=ev=>{
    pendingImage=ev.target.result;
    const mm=ev.target.result.match(/data:([^;]+);/);
    pendingMime=mm?mm[1]:'image/jpeg';
    pendingB64=ev.target.result.split(',')[1];
    scanStatus=null; render();
    if(apiKey) scanWithAI();
    else{scanStatus={type:'warn',msg:'No API key — fill details manually or tap ⚙ API to enable scanning.'};render();}
  };
  reader.readAsDataURL(file);
  e.target.value='';
}

// ── AI Scan ────────────────────────────────────────────────────────
function capForm() {
  editForm.store       = document.getElementById('f-store')?.value       ?? editForm.store;
  editForm.date        = document.getElementById('f-date')?.value        ?? editForm.date;
  editForm.amount      = document.getElementById('f-amount')?.value      ?? editForm.amount;
  editForm.tax         = document.getElementById('f-tax')?.value         ?? editForm.tax;
  editForm.paymentType = document.getElementById('f-paytype')?.value     ?? editForm.paymentType;
  editForm.cardLast4   = document.getElementById('f-cardlast4')?.value   ?? editForm.cardLast4;
  editForm.cardType    = document.getElementById('f-cardtype')?.value    ?? editForm.cardType;
  editForm.category    = document.getElementById('f-category')?.value    ?? editForm.category;
  editForm.notes       = document.getElementById('f-notes')?.value       ?? editForm.notes;
}
async function scanWithAI() {
  capForm();
  if(!pendingB64||!apiKey) return;

  // Enforce free tier scan limit
  if (!canScan()) {
    showPaywall('You have used all ' + TIERS.free.scansPerMonth + ' free AI scans this month.');
    return;
  }

  // Soft cap throttle for power users (100+ scans/month)
  if (scansThisMonth >= SOFT_CAP && userTier !== 'free') {
    const now = Date.now();
    const wait = 2000 - (now - lastScanTime);
    if (wait > 0) {
      scanStatus={type:'warn',msg:'⚡ Power user mode — scans throttled slightly to manage costs. Processing…'};
      render();
      await new Promise(res => setTimeout(res, wait));
    }
  }
  lastScanTime = Date.now();
  scanStatus={type:'scanning',msg:'AI is reading your receipt…'}; render();
  try {
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-opus-4-5',max_tokens:512,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:pendingMime,data:pendingB64}},
          {type:'text',text:`You are an OCR assistant. Look at this receipt and extract:
1. store_name: the business or store name
2. date: transaction date in YYYY-MM-DD format
3. total: the final total as a plain number (no $ or commas)
4. tax: the tax amount as a plain number (no $ or commas), empty string if not found
5. payment_type: the payment method, one of: "Credit Card", "Debit Card", "Unknown Card", "Cash", "Check", "Other", or empty string if not found. Use "Unknown Card" when a card brand (Visa, Mastercard, Amex, Discover, etc.) is detected but credit vs debit is not specified on the receipt
6. card_last4: the last 4 digits of the payment card if visible on receipt, empty string if not found or if cash/check
7. card_type: the card network if visible, e.g. "Visa", "Mastercard", "Amex", "Discover", empty string if not found
8. category: classify the purchase into exactly one of these categories:
   - "Fuel" — gas stations, fuel, diesel, petrol, electric vehicle charging
   - "Supplies" — office supplies, cleaning supplies, consumables, hardware stores, general merchandise
   - "Equipment" — tools, machinery, electronics, equipment purchases or rentals
   - "Meals" — restaurants, cafes, fast food, catering, coffee shops, food delivery
   - "Other" — anything that does not clearly fit the above
Respond ONLY with raw JSON, no markdown, no extra text:
{"store_name":"","date":"","total":"","tax":"","payment_type":"","card_last4":"","card_type":"","category":""}`}
        ]}]
      })
    });
    if(!resp.ok){
      const err=await resp.json().catch(()=>({}));
      scanStatus=resp.status===401
        ?{type:'error',msg:'Invalid API key (401). Check your key in ⚙ API settings.'}
        :{type:'error',msg:`API error ${resp.status}: ${err?.error?.message||''}`};
      render();return;
    }
    const data=await resp.json();
    const raw=(data.content||[]).map(c=>c.text||'').join('').trim();
    let parsed;
    try{parsed=JSON.parse(raw.replace(/```json|```/g,'').trim());}
    catch{scanStatus={type:'error',msg:`Could not parse response: "${raw.slice(0,80)}"`};render();return;}
    const VALID_CATS=['Fuel','Supplies','Equipment','Meals','Other'];
    const VALID_PAY=['Credit Card','Debit Card','Unknown Card','Cash','Check','Other'];
    const filled=[];
    if(parsed.store_name){editForm.store=parsed.store_name;filled.push('store');}
    if(parsed.date&&/\d{4}-\d{2}-\d{2}/.test(parsed.date)){editForm.date=parsed.date;filled.push('date');}
    if(parsed.total&&!isNaN(parseFloat(parsed.total))){editForm.amount=parseFloat(parsed.total).toFixed(2);filled.push('amount');}
    if(parsed.tax&&!isNaN(parseFloat(parsed.tax))){editForm.tax=parseFloat(parsed.tax).toFixed(2);filled.push('tax');}
    if(parsed.payment_type&&VALID_PAY.includes(parsed.payment_type)){editForm.paymentType=parsed.payment_type;filled.push('payment');}
    if(parsed.card_last4&&/^\d{4}$/.test(parsed.card_last4)){editForm.cardLast4=parsed.card_last4;}
    if(parsed.card_type){editForm.cardType=parsed.card_type;}
    if(parsed.category&&VALID_CATS.includes(parsed.category)){
      let cat=parsed.category;
      if(cat==='Equipment'&&parsed.total&&parseFloat(parsed.total)<750){ cat='Supplies'; }
      editForm.category=cat;
      filled.push('category');
    }
    await incrementScanCount();
    // Fetch merchant logo in background after AI fills store name
    if (editForm.store) {
      fetchMerchantLogo(editForm.store).then(url => {
        if (url) logoCache[editForm.store.trim().toLowerCase()] = url;
      });
    }
    const remaining = scansRemaining();
    const remNote = userTier==='free' && remaining<=3 ? ` (${remaining} free scan${remaining!==1?'s':''} left this month)` : '';
    scanStatus=filled.length
      ?{type:'success',msg:`✓ AI filled in: ${filled.join(', ')}. Review and save below.${remNote}`}
      :{type:'warn',msg:'AI could not read clear data. Please fill in manually.'};
  } catch(err) {
    scanStatus={type:'error',msg:err.message.includes('fetch')?'Network error — check connection.':'Error: '+err.message};
  }
  render();
}

// ── Save / Delete ──────────────────────────────────────────────────
async function doSave() {
  capForm();
  const {store,date,amount,category,notes}=editForm;
  if(!amount||isNaN(parseFloat(amount))){alert('Please enter a valid amount.');return;}
  if(!canAddReceipt()){
    showPaywall('Free accounts are limited to ' + TIERS.free.maxReceipts + ' stored receipts.');
    return;
  }
  const parsedAmount=parseFloat(amount);

  // Duplicate detection — match on date + amount, and optionally store name
  const duplicates=receipts.filter(r=>{
    const sameDate = r.date && date && r.date===date;
    const sameAmount = Math.abs(parseFloat(r.amount||0)-parsedAmount)<0.01;
    const sameStore = store && r.store && r.store.trim().toLowerCase()===store.trim().toLowerCase();
    // Flag if same date+amount, or same date+store+amount
    return sameDate && sameAmount || (sameStore && sameAmount);
  });

  if(duplicates.length>0){
    const d=duplicates[0];
    const msg=`A possible duplicate was found:

`+
      `  Store:  ${d.store||'Unknown'}
`+
      `  Date:   ${d.date||'—'}
`+
      `  Amount: $${parseFloat(d.amount).toFixed(2)}

`+
      `Save anyway?`;
    if(!confirm(msg)) return;
  }

  const tax      = editForm.tax        || '';
  const payType  = editForm.paymentType || '';
  const last4    = editForm.cardLast4   || '';
  const cardType = editForm.cardType    || '';
  const r={id:Date.now().toString(),store:store||'',date,amount:parsedAmount,tax:tax?parseFloat(tax):null,paymentType:payType,cardLast4:last4,cardType,category,notes,image:pendingImage||null,createdAt:new Date().toISOString(),orgId:currentOrg?.id||null,submittedBy:currentUser?.email||null};
  await persistReceipt(r);
  pendingImage=null;pendingB64=null;scanStatus=null;
  editForm={store:'',date:'',amount:'',tax:'',paymentType:'',cardLast4:'',cardType:'',category:'Fuel',notes:''};
  showTab('receipts');
}

async function saveEdit(id, btn) {
  const store    = document.getElementById('e-store')?.value?.trim();
  const date     = document.getElementById('e-date')?.value;
  const amount   = document.getElementById('e-amount')?.value;
  const taxVal   = document.getElementById('e-tax')?.value;
  const payType  = document.getElementById('e-paytype')?.value;
  const cardType = document.getElementById('e-cardtype')?.value?.trim();
  const cardLast4= document.getElementById('e-cardlast4')?.value?.trim();
  const category = document.getElementById('e-category')?.value;
  const notes    = document.getElementById('e-notes')?.value?.trim();
  if(!amount||isNaN(parseFloat(amount))){alert('Please enter a valid amount.');return;}
  const idx=receipts.findIndex(r=>r.id===id);
  if(idx===-1) return;
  receipts[idx]={...receipts[idx],store:store||'',date,amount:parseFloat(amount),tax:taxVal?parseFloat(taxVal):null,paymentType:payType||'',cardType:cardType||'',cardLast4:cardLast4||'',category,notes,updatedAt:new Date().toISOString()};
  await saveReceiptToSupabase(receipts[idx]);
  try { await dbPut('receipts', receipts[idx]); } catch(e) { lsFallback(); }
  lsBak();
  btn.closest('.overlay').remove();
  render();
}

async function doDelete(id,btn) {
  if(!confirm('Delete this receipt?')) return;
  await removeReceipt(id);
  btn.closest('.overlay').remove(); render();
}

async function compressImage(dataUrl, maxWidth=1200, quality=0.7) {
  if (!dataUrl || !dataUrl.startsWith('data:image')) return dataUrl;
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

async function doExport() {
  // Show progress modal
  const prog = document.createElement('div');
  prog.className = 'overlay';
  prog.innerHTML = `<div class="modal" style="text-align:center;padding:30px 20px">
    <div class="spinner" style="margin:0 auto 14px"></div>
    <div style="font-size:15px;font-weight:600;margin-bottom:6px">Preparing Backup</div>
    <div id="prog-msg" style="font-size:13px;color:var(--text2)">Compressing images…</div>
    <div style="margin-top:12px;background:var(--surface2);border-radius:4px;height:6px;overflow:hidden">
      <div id="prog-bar" style="height:6px;background:var(--accent);border-radius:4px;width:0%;transition:width 0.2s"></div>
    </div>
  </div>`;
  document.body.appendChild(prog);

  const compressed = [];
  for (let i = 0; i < receipts.length; i++) {
    const r = receipts[i];
    const pct = Math.round((i / receipts.length) * 100);
    const msg = document.getElementById('prog-msg');
    const bar = document.getElementById('prog-bar');
    if (msg) msg.textContent = `Compressing ${i+1} of ${receipts.length}…`;
    if (bar) bar.style.width = pct + '%';
    // Small yield to keep UI responsive
    await new Promise(r => setTimeout(r, 0));
    const compressedImage = r.image ? await compressImage(r.image) : null;
    compressed.push({...r, image: compressedImage});
  }

  if (document.getElementById('prog-bar')) document.getElementById('prog-bar').style.width = '100%';
  if (document.getElementById('prog-msg')) document.getElementById('prog-msg').textContent = 'Building backup file…';
  await new Promise(r => setTimeout(r, 100));

  const data = {
    version: 3,
    exported: new Date().toISOString(),
    receiptCount: compressed.length,
    receipts: compressed
  };
  const json = JSON.stringify(data, null, 2);
  const sizeMB = (new Blob([json]).size / 1024 / 1024).toFixed(1);

  prog.remove();

  const blob = new Blob([json], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `receipttrack_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  alert(`✓ Backup saved (${sizeMB} MB, ${compressed.length} receipts)`);
}
async function onImport(e) {
  const file=e.target.files[0]; if(!file) return;
  let data; try{data=JSON.parse(await file.text());}catch{alert('Invalid backup file.');return;}
  if(!data.receipts||!Array.isArray(data.receipts)){alert('Not a valid ReceiptTrack backup.');return;}
  const hasPhotos = data.receipts.filter(r=>r.image).length;
  const photoNote = hasPhotos ? '\n(includes ' + hasPhotos + ' receipt photo' + (hasPhotos!==1?'s':'') + ')' : '';
  if(!confirm('Import ' + data.receipts.length + ' receipts?' + photoNote + '\nNew ones will be merged with your existing ' + receipts.length + '.')) return;
  const existing=new Set(receipts.map(r=>r.id));
  const newOnes=data.receipts.filter(r=>!existing.has(r.id));

  // Clear logoUrl from imported receipts so they get freshly fetched
  // (backup logos may be stale URLs or missing)
  newOnes.forEach(r => { r.logoUrl = null; });

  // Save to IndexedDB and Supabase
  for(const r of newOnes){
    try { await dbPut('receipts', r); } catch(e) {}
    try { await saveReceiptToSupabase(r); } catch(e) {}
  }

  receipts=[...receipts,...newOnes].sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0));
  lsBak();
  document.querySelector('.overlay')?.remove();
  render();
  alert('✓ Imported ' + newOnes.length + ' new receipts.');
  e.target.value='';

  // Fetch logos for all imported receipts in background
  if (newOnes.length > 0) {
    attachLogos(newOnes);
  }
}

// ── Excel Export ───────────────────────────────────────────────────
function exportToExcel() {
  if(!TIERS[userTier].excel){ showPaywall('Excel export is a Pro feature.'); return; }
  if(!receipts.length){alert('No receipts to export yet.');return;}
  const rows=receipts.map(r=>({Date:r.date||'',Store:r.store||'',Amount:parseFloat(r.amount||0),Tax:r.tax!=null?parseFloat(r.tax):'',Payment:r.paymentType||'','Card Type':r.cardType||'','Last 4':r.cardLast4||'',Category:r.category||'',Notes:r.notes||'','Has Photo':r.image?'Yes':'No',Added:new Date(r.createdAt).toLocaleDateString()}));
  rows.push({},{Date:'',Store:'GRAND TOTAL',Amount:parseFloat(sum(receipts).toFixed(2)),Category:'',Notes:'','Has Photo':'',Added:''});
  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[12,26,12,10,14,12,8,14,26,10,14].map(w=>({wch:w}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'All Receipts');
  CATS.forEach(cat=>{
    const cr=receipts.filter(r=>r.category===cat).map(r=>({Date:r.date||'',Store:r.store||'',Amount:parseFloat(r.amount||0),Tax:r.tax!=null?parseFloat(r.tax):'',Payment:r.paymentType||'','Card Type':r.cardType||'','Last 4':r.cardLast4||'',Notes:r.notes||''}));
    if(cr.length){cr.push({},{Date:'',Store:'TOTAL',Amount:parseFloat(sum(receipts.filter(r=>r.category===cat)).toFixed(2)),Notes:''});XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(cr),cat);}
  });
  XLSX.writeFile(wb,`ReceiptTrack_${new Date().toISOString().slice(0,10)}.xlsx`);
}
