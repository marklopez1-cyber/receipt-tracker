<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ReceiptTrack">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2d5a27">
<title>ReceiptTrack</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  :root {
    --bg:#f7f6f2; --surface:#fff; --surface2:#f0ede6;
    --text:#1a1a18; --text2:#6b6b65; --text3:#9b9b95;
    --accent:#2d5a27; --accent-light:#e8f0e7; --accent-mid:#4a8a42;
    --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.14);
    --danger:#c0392b; --info:#185fa5;
    --fuel:#d4750a; --supplies:#185fa5; --equipment:#6b3fa0; --meals:#c0392b; --other:#5f5e5a;
    --fuel-bg:#faeeda; --supplies-bg:#e6f1fb; --equipment-bg:#f0ebfa; --meals-bg:#fcebeb; --other-bg:#f1efe8;
    --r:10px; --rs:6px;
    --sat:env(safe-area-inset-top); --sab:env(safe-area-inset-bottom);
    font-family:Georgia,serif;
  }
  body { background:var(--bg); color:var(--text); min-height:100vh; overscroll-behavior:none; }
  .app { max-width:480px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; }
  .header { background:var(--accent); color:white; padding:14px 16px 12px; padding-top:calc(14px + var(--sat)); position:sticky; top:0; z-index:100; }
  .header-top { display:flex; align-items:center; justify-content:space-between; }
  .logo { font-size:18px; font-weight:700; letter-spacing:-0.5px; }
  .logo small { opacity:.6; font-weight:400; font-size:11px; display:block; }
  .hbtns { display:flex; gap:5px; }
  .hbtn { background:rgba(255,255,255,0.15); border:none; color:white; border-radius:7px; padding:7px 9px; font-size:11px; cursor:pointer; font-family:inherit; }
  .hbtn:active { background:rgba(255,255,255,0.3); }
  .nav { display:flex; background:var(--surface); border-bottom:1px solid var(--border); }
  .ni { flex:1; padding:10px 4px; text-align:center; font-size:10px; color:var(--text2); cursor:pointer; border-bottom:2px solid transparent; font-family:Georgia,serif; }
  .ni.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:600; }
  .ni-icon { font-size:15px; margin-bottom:2px; }
  .content { flex:1; padding:14px; overflow-y:auto; padding-bottom:calc(80px + var(--sab)); -webkit-overflow-scrolling:touch; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-bottom:13px; }
  .card { background:var(--surface); border-radius:var(--r); padding:12px; border:1px solid var(--border); }
  .card.accent { background:var(--accent); }
  .clabel { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:.5px; margin-bottom:3px; }
  .card.accent .clabel { color:rgba(255,255,255,.7); }
  .cval { font-size:20px; font-weight:700; color:var(--text); }
  .card.accent .cval { color:white; }
  .sec { font-size:11px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; margin:13px 0 8px; }
  .catbars { background:var(--surface); border-radius:var(--r); padding:13px; border:1px solid var(--border); margin-bottom:13px; }
  .cr { margin-bottom:10px; } .cr:last-child { margin-bottom:0; }
  .crtop { display:flex; justify-content:space-between; align-items:center; margin-bottom:3px; }
  .crname { font-size:13px; display:flex; align-items:center; gap:5px; }
  .dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .cramount { font-size:13px; font-weight:600; }
  .barbg { height:4px; background:var(--surface2); border-radius:2px; }
  .barfill { height:4px; border-radius:2px; }
  .rc { background:var(--surface); border-radius:var(--r); padding:12px; border:1px solid var(--border); margin-bottom:9px; cursor:pointer; }
  .rc:active { background:var(--surface2); }
  .rctop { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
  .rcname { font-size:15px; font-weight:600; flex:1; }
  .rcamt { font-size:17px; font-weight:700; color:var(--accent); flex-shrink:0; }
  .rcmeta { display:flex; gap:7px; margin-top:5px; align-items:center; flex-wrap:wrap; }
  .rcdate { font-size:11px; color:var(--text3); }
  .badge { font-size:9px; padding:2px 7px; border-radius:20px; font-weight:600; text-transform:uppercase; letter-spacing:.3px; }
  .badge.Fuel { background:var(--fuel-bg); color:var(--fuel); }
  .badge.Supplies { background:var(--supplies-bg); color:var(--info); }
  .badge.Equipment { background:var(--equipment-bg); color:var(--equipment); }
  .badge.Meals { background:var(--meals-bg); color:var(--danger); }
  .badge.Other { background:var(--other-bg); color:var(--other); }
  .rcnotes { font-size:11px; color:var(--text2); margin-top:4px; font-style:italic; }
  .rcphoto { font-size:10px; color:var(--accent); margin-top:3px; }
  .empty { text-align:center; padding:44px 20px; color:var(--text3); }
  .empty-icon { font-size:36px; margin-bottom:10px; }
  .empty-title { font-size:15px; color:var(--text2); margin-bottom:5px; font-weight:600; }
  .empty-sub { font-size:13px; line-height:1.5; }
  .scanarea { background:var(--surface); border-radius:var(--r); border:2px dashed var(--border2); padding:24px 16px; text-align:center; margin-bottom:13px; cursor:pointer; }
  .scanarea:active { background:var(--accent-light); }
  .scan-icon { font-size:28px; margin-bottom:7px; }
  .scan-text { font-size:14px; color:var(--text2); margin-bottom:3px; }
  .scan-sub { font-size:12px; color:var(--text3); }
  .scan-btns { display:flex; gap:10px; margin-top:12px; justify-content:center; }
  .btn { border:none; border-radius:var(--rs); padding:11px 18px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; }
  .btn-p { background:var(--accent); color:white; } .btn-p:active { background:var(--accent-mid); }
  .btn-s { background:var(--surface2); color:var(--text); border:1px solid var(--border2); } .btn-s:active { opacity:.7; }
  .btn-d { background:#fee; color:var(--danger); border:1px solid rgba(192,57,43,.2); }
  .btn-full { width:100%; }
  .btn-save { width:100%; padding:14px; font-size:15px; }
  .preview { width:100%; max-height:200px; object-fit:contain; border-radius:var(--rs); margin-bottom:10px; border:1px solid var(--border); }
  .sb { border-radius:var(--rs); padding:11px 13px; font-size:13px; margin-bottom:12px; display:flex; align-items:flex-start; gap:9px; line-height:1.5; }
  .sb.scanning { background:var(--accent-light); border:1px solid rgba(45,90,39,.25); color:var(--accent); }
  .sb.error { background:#fff0f0; border:1px solid rgba(192,57,43,.25); color:var(--danger); }
  .sb.success { background:#f0fff4; border:1px solid rgba(45,90,39,.25); color:#1a6b2a; }
  .sb.warn { background:#fff8e1; border:1px solid #f0c040; color:#7a5c00; }
  .spinner { width:15px; height:15px; border:2px solid rgba(45,90,39,.3); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; flex-shrink:0; margin-top:2px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .fg { margin-bottom:13px; }
  .fl { font-size:11px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:.4px; margin-bottom:5px; display:block; }
  .fi { width:100%; background:var(--surface); border:1px solid var(--border2); border-radius:var(--rs); padding:11px 12px; font-size:16px; color:var(--text); font-family:inherit; outline:none; -webkit-appearance:none; }
  .fi:focus { border-color:var(--accent); }
  .fsel { width:100%; background:var(--surface); border:1px solid var(--border2); border-radius:var(--rs); padding:11px 12px; font-size:16px; color:var(--text); font-family:inherit; outline:none; -webkit-appearance:none; cursor:pointer; }
  .frow { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:200; display:flex; align-items:flex-end; }
  .modal { background:var(--surface); border-radius:16px 16px 0 0; width:100%; max-height:88vh; overflow-y:auto; padding:18px; padding-bottom:calc(18px + var(--sab)); -webkit-overflow-scrolling:touch; }
  .mhead { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .mtitle { font-size:16px; font-weight:700; }
  .mclose { background:var(--surface2); border:none; width:30px; height:30px; border-radius:50%; font-size:14px; cursor:pointer; }
  .mrow { display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--border); font-size:14px; gap:10px; }
  .mlabel { color:var(--text2); flex-shrink:0; }
  .mval { font-weight:600; text-align:right; }
  .mimg { width:100%; max-height:220px; object-fit:contain; border-radius:var(--rs); margin-bottom:13px; border:1px solid var(--border); }
  .filters { display:flex; gap:7px; overflow-x:auto; padding-bottom:4px; margin-bottom:12px; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  .filters::-webkit-scrollbar { display:none; }
  .chip { white-space:nowrap; padding:7px 13px; border-radius:20px; font-size:12px; font-weight:600; border:1px solid var(--border2); background:var(--surface); color:var(--text2); cursor:pointer; font-family:inherit; }
  .chip.active { background:var(--accent); color:white; border-color:var(--accent); }
  .tbar { background:var(--surface); border-top:1px solid var(--border); padding:12px 16px; padding-bottom:calc(12px + var(--sab)); display:flex; justify-content:space-between; align-items:center; position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; z-index:50; }
  .tlabel { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; }
  .tval { font-size:19px; font-weight:700; color:var(--accent); }
  .divider { height:1px; background:var(--border); margin:13px 0; }
  .keyrow { display:flex; gap:8px; margin-top:10px; }
  .keyrow .fi { flex:1; font-family:monospace; font-size:13px; }
  .bkrow { display:flex; gap:10px; }
  .bkrow .btn-s { flex:1; font-size:13px; padding:10px 8px; }
  .hidden { display:none; }
  .install-banner { background:#1a3d17; color:white; padding:10px 14px; font-size:12px; display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .install-banner button { background:white; color:var(--accent); border:none; border-radius:5px; padding:6px 12px; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; flex-shrink:0; }
</style>
</head>
<body>
<div class="app" id="app">
  <div id="install-banner" class="install-banner hidden">
    <span>📱 Add to Home Screen for persistent storage</span>
    <button onclick="showInstallHelp()">How?</button>
  </div>
  <div class="header">
    <div class="header-top">
      <div class="logo">ReceiptTrack <small>Expense Manager</small></div>
      <div class="hbtns">
        <button class="hbtn" onclick="showApiSetup()">⚙ API</button>
        <button class="hbtn" onclick="showBackup()">☁ Backup</button>
        <button class="hbtn" onclick="exportToExcel()">⬇ Excel</button>
      </div>
    </div>
  </div>
  <div class="nav">
    <div class="ni active" onclick="showTab('dashboard')" id="tab-dashboard"><div class="ni-icon">◼</div>Dashboard</div>
    <div class="ni" onclick="showTab('receipts')" id="tab-receipts"><div class="ni-icon">☰</div>Receipts</div>
    <div class="ni" onclick="showTab('scan')" id="tab-scan"><div class="ni-icon">+</div>Scan / Add</div>
  </div>
  <div class="content" id="content"><div class="empty"><div class="empty-icon">🧾</div><div>Loading…</div></div></div>
</div>
<input type="file" id="file-input" class="hidden" accept="image/*">
<input type="file" id="import-input" class="hidden" accept=".json">

<script>
// ── Inline Service Worker via Blob URL ─────────────────────────────
// This avoids needing a separate sw.js file entirely
const SW_CODE = `
const CACHE = 'receipttrack-v4';
self.addEventListener('install', e => { self.skipWaiting(); });
self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
    ).then(() => self.clients.claim())
  );
});
self.addEventListener('fetch', e => {
  if (e.request.method !== 'GET') return;
  if (e.request.url.includes('api.anthropic.com')) return;
  if (e.request.url.includes('cdnjs.cloudflare.com')) return;
  e.respondWith(
    fetch(e.request)
      .then(resp => {
        if (resp && resp.status === 200 && resp.type === 'basic') {
          caches.open(CACHE).then(c => c.put(e.request, resp.clone()));
        }
        return resp;
      })
      .catch(() => caches.match(e.request))
  );
});
`;

// ── Inline Web App Manifest via <link> tag ─────────────────────────
const MANIFEST = {
  name: "ReceiptTrack",
  short_name: "ReceiptTrack",
  description: "Capture, scan and track expense receipts",
  start_url: "/",
  scope: "/",
  display: "standalone",
  background_color: "#f7f6f2",
  theme_color: "#2d5a27",
  orientation: "portrait",
  icons: [
    { src: "data:image/svg+xml," + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192"><rect width="192" height="192" rx="40" fill="#2d5a27"/><rect x="44" y="32" width="104" height="128" rx="8" fill="white"/><rect x="56" y="52" width="80" height="8" rx="4" fill="#2d5a27" opacity="0.3"/><rect x="56" y="68" width="80" height="8" rx="4" fill="#2d5a27" opacity="0.3"/><rect x="56" y="84" width="56" height="8" rx="4" fill="#2d5a27" opacity="0.3"/><rect x="56" y="108" width="80" height="20" rx="4" fill="#2d5a27"/></svg>`), sizes: "192x192", type: "image/svg+xml", purpose: "any maskable" },
    { src: "data:image/svg+xml," + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512"><rect width="512" height="512" rx="100" fill="#2d5a27"/><rect x="116" y="80" width="280" height="352" rx="20" fill="white"/><rect x="148" y="136" width="216" height="20" rx="10" fill="#2d5a27" opacity="0.25"/><rect x="148" y="172" width="216" height="20" rx="10" fill="#2d5a27" opacity="0.25"/><rect x="148" y="208" width="152" height="20" rx="10" fill="#2d5a27" opacity="0.25"/><rect x="148" y="264" width="216" height="52" rx="10" fill="#2d5a27"/></svg>`), sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }
  ]
};

// Inject manifest as blob URL
const manifestBlob = new Blob([JSON.stringify(MANIFEST)], {type:'application/json'});
const manifestUrl  = URL.createObjectURL(manifestBlob);
const manifestLink = document.createElement('link');
manifestLink.rel  = 'manifest';
manifestLink.href = manifestUrl;
document.head.appendChild(manifestLink);

// Register SW from blob URL — works on any domain/path with no separate file needed
if ('serviceWorker' in navigator) {
  const swBlob = new Blob([SW_CODE], {type:'application/javascript'});
  const swUrl  = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl, {scope: '/'})
    .then(reg => console.log('SW registered, scope:', reg.scope))
    .catch(err => {
      // Blob SW may fail on some browsers — silently fall back, app still works
      console.info('SW not registered (non-critical):', err.message);
    });
}

// ── IndexedDB ──────────────────────────────────────────────────────
const DB_NAME='ReceiptTrackDB', DB_VER=1;
let db=null;
function openDB() {
  return new Promise((res,rej) => {
    const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('receipts')) d.createObjectStore('receipts',{keyPath:'id'});
      if(!d.objectStoreNames.contains('settings')) d.createObjectStore('settings',{keyPath:'key'});
    };
    r.onsuccess=e=>{db=e.target.result;res(db);};
    r.onerror=e=>rej(e.target.error);
  });
}
const txs  = (s,m='readonly') => db.transaction(s,m).objectStore(s);
const dbAll = s => new Promise((res,rej)=>{const r=txs(s).getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});
const dbPut = (s,o) => new Promise((res,rej)=>{const r=txs(s,'readwrite').put(o);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});
const dbDel = (s,k) => new Promise((res,rej)=>{const r=txs(s,'readwrite').delete(k);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});
const dbGet = (s,k) => new Promise(res=>{const r=txs(s).get(k);r.onsuccess=()=>res(r.result?.value??null);r.onerror=()=>res(null);});

// ── State ──────────────────────────────────────────────────────────
let receipts=[],apiKey='',currentTab='dashboard',currentFilter='All';
let pendingImage=null,pendingB64=null,pendingMime='image/jpeg';
let editForm={store:'',date:'',amount:'',category:'Fuel',notes:''};
let scanStatus=null;
const CATS=['Fuel','Supplies','Equipment','Meals','Other'];
const CATC={Fuel:'#d4750a',Supplies:'#185fa5',Equipment:'#6b3fa0',Meals:'#c0392b',Other:'#5f5e5a'};

// ── Init ───────────────────────────────────────────────────────────
async function init() {
  try {
    await openDB();
    receipts = await dbAll('receipts');
    apiKey   = (await dbGet('settings','apiKey')) || '';
  } catch(e) {
    console.warn('IndexedDB unavailable, using localStorage fallback');
    receipts = JSON.parse(localStorage.getItem('rt_receipts')||'[]');
    apiKey   = localStorage.getItem('rt_apikey')||'';
  }
  const isStandalone = window.matchMedia('(display-mode:standalone)').matches || navigator.standalone;
  if (!isStandalone) document.getElementById('install-banner').classList.remove('hidden');
  showTab('dashboard');
}

async function persistReceipt(r) {
  receipts.unshift(r);
  try { await dbPut('receipts',r); } catch(e) { lsFallback(); }
  lsBak();
}
async function removeReceipt(id) {
  receipts=receipts.filter(r=>r.id!==id);
  try { await dbDel('receipts',id); } catch(e) { lsFallback(); }
  lsBak();
}
async function storeKey(key) {
  apiKey=key;
  try { key ? await dbPut('settings',{key:'apiKey',value:key}) : await dbDel('settings','apiKey'); } catch(e) {}
  localStorage.setItem('rt_apikey_bak',key);
}
function lsFallback() { localStorage.setItem('rt_receipts',JSON.stringify(receipts)); }
function lsBak() { try { localStorage.setItem('rt_receipts_bak',JSON.stringify(receipts.map(r=>({...r,image:null})))); } catch(e){} }

// ── Tabs & Render ──────────────────────────────────────────────────
function showTab(tab) {
  currentTab=tab;
  ['dashboard','receipts','scan'].forEach(t=>{ document.getElementById('tab-'+t).className='ni'+(t===tab?' active':''); });
  if(tab==='scan'){pendingImage=null;pendingB64=null;scanStatus=null;editForm={store:'',date:'',amount:'',category:'Fuel',notes:''};}
  render();
}
const fmt = n=>'$'+parseFloat(n||0).toFixed(2);
const sum  = arr=>arr.reduce((s,r)=>s+parseFloat(r.amount||0),0);
const esc  = s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const eA   = s=>String(s||'').replace(/"/g,'&quot;');

function render() {
  const el=document.getElementById('content');
  if(currentTab==='dashboard') el.innerHTML=renderDash();
  else if(currentTab==='receipts') el.innerHTML=renderList();
  else el.innerHTML=renderScan();
  document.getElementById('file-input').onchange=onFileSelect;
  document.getElementById('import-input').onchange=onImport;
}

function renderDash() {
  const tot=sum(receipts), ym=new Date().toISOString().slice(0,7);
  const mTot=sum(receipts.filter(r=>r.date&&r.date.startsWith(ym)));
  const ct={}; CATS.forEach(c=>{ct[c]=sum(receipts.filter(r=>r.category===c));});
  const max=Math.max(...Object.values(ct),1);
  const rec=[...receipts].sort((a,b)=>new Date(b.date||0)-new Date(a.date||0)).slice(0,5);
  return `
  ${!apiKey?`<div class="sb warn"><span>⚙</span><div>AI scanning inactive — tap <strong>⚙ API</strong> to add your Anthropic API key.</div></div>`:''}
  <div class="grid2">
    <div class="card accent"><div class="clabel">Total Spent</div><div class="cval">${fmt(tot)}</div></div>
    <div class="card"><div class="clabel">This Month</div><div class="cval">${fmt(mTot)}</div></div>
    <div class="card"><div class="clabel">Receipts</div><div class="cval">${receipts.length}</div></div>
    <div class="card"><div class="clabel">Avg Receipt</div><div class="cval">${receipts.length?fmt(tot/receipts.length):'$0.00'}</div></div>
  </div>
  <div class="sec">Spending by Category</div>
  <div class="catbars">${CATS.map(c=>`<div class="cr">
    <div class="crtop"><div class="crname"><div class="dot" style="background:${CATC[c]}"></div>${c}</div><div class="cramount">${fmt(ct[c])}</div></div>
    <div class="barbg"><div class="barfill" style="width:${(ct[c]/max*100).toFixed(1)}%;background:${CATC[c]}"></div></div>
  </div>`).join('')}</div>
  ${rec.length?`<div class="sec">Recent Receipts</div>${rec.map(rcCard).join('')}`:''}
  ${!receipts.length?`<div class="empty"><div class="empty-icon">🧾</div><div class="empty-title">No receipts yet</div><div class="empty-sub">Tap <strong>Scan / Add</strong> to get started.</div></div>`:''}`;
}

function renderList() {
  const fil=currentFilter==='All'?receipts:receipts.filter(r=>r.category===currentFilter);
  const sorted=[...fil].sort((a,b)=>new Date(b.date||0)-new Date(a.date||0));
  return `
  <div class="filters">${['All',...CATS].map(f=>`<button class="chip${currentFilter===f?' active':''}" onclick="setFilter('${f}')">${f}</button>`).join('')}</div>
  ${sorted.length?sorted.map(rcCard).join(''):`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">No receipts in "${currentFilter}"</div></div>`}
  <div class="tbar"><div class="tlabel">Total (${fil.length})</div><div class="tval">${fmt(sum(fil))}</div></div>`;
}

function rcCard(r) {
  return `<div class="rc" onclick="viewReceipt('${r.id}')">
    <div class="rctop"><div class="rcname">${esc(r.store||'Unknown Store')}</div><div class="rcamt">${fmt(r.amount)}</div></div>
    <div class="rcmeta"><div class="rcdate">${r.date||'—'}</div><span class="badge ${r.category||'Other'}">${r.category||'Other'}</span></div>
    ${r.notes?`<div class="rcnotes">${esc(r.notes)}</div>`:''}
    ${r.image?`<div class="rcphoto">📷 Photo attached</div>`:''}
  </div>`;
}

function renderScan() {
  const today=new Date().toISOString().slice(0,10);
  const stHtml=scanStatus?`<div class="sb ${scanStatus.type}">
    ${scanStatus.type==='scanning'?'<div class="spinner"></div>':`<span>${scanStatus.type==='success'?'✓':scanStatus.type==='error'?'✕':'⚠'}</span>`}
    <div>${scanStatus.msg}</div>
  </div>`:'';
  return `
  ${!apiKey?`<div class="sb warn"><span>⚠</span><div>AI scanning needs an API key. <span style="text-decoration:underline;cursor:pointer" onclick="showApiSetup()">Tap to set it up</span> or fill in manually.</div></div>`:''}
  ${pendingImage
    ?`<img class="preview" src="${pendingImage}" alt="Receipt">
      ${apiKey?`<button class="btn btn-s btn-full" style="margin-bottom:11px" onclick="scanWithAI()">🔄 Re-scan with AI</button>`:''}`
    :`<div class="scanarea" onclick="openPicker(null)">
        <div class="scan-icon">📷</div>
        <div class="scan-text">Upload or photograph a receipt</div>
        <div class="scan-sub">AI reads store, date &amp; total automatically</div>
        <div class="scan-btns">
          <button class="btn btn-p" onclick="event.stopPropagation();openPicker('environment')">📷 Camera</button>
          <button class="btn btn-s" onclick="event.stopPropagation();openPicker(null)">🖼 Gallery</button>
        </div>
      </div>`}
  ${stHtml}
  <div class="fg"><label class="fl">Establishment / Store</label>
    <input class="fi" id="f-store" type="text" placeholder="e.g. Chevron, Home Depot" value="${eA(editForm.store)}" autocomplete="organization"></div>
  <div class="frow">
    <div class="fg"><label class="fl">Date</label><input class="fi" id="f-date" type="date" value="${editForm.date||today}"></div>
    <div class="fg"><label class="fl">Amount ($)</label><input class="fi" id="f-amount" type="number" step="0.01" min="0" placeholder="0.00" value="${eA(editForm.amount)}" inputmode="decimal"></div>
  </div>
  <div class="fg"><label class="fl">Category</label>
    <select class="fsel" id="f-category">${CATS.map(c=>`<option${editForm.category===c?' selected':''}>${c}</option>`).join('')}</select></div>
  <div class="fg"><label class="fl">Notes (optional)</label>
    <input class="fi" id="f-notes" type="text" placeholder="e.g. Job site #42" value="${eA(editForm.notes)}"></div>
  <button class="btn btn-p btn-save" onclick="doSave()">💾 Save Receipt</button>`;
}

// ── File & Camera ──────────────────────────────────────────────────
function openPicker(capture) {
  const fi=document.getElementById('file-input');
  capture?fi.setAttribute('capture',capture):fi.removeAttribute('capture');
  fi.click();
}
function onFileSelect(e) {
  const file=e.target.files[0]; if(!file) return;
  if(!file.type.startsWith('image/')){alert('Please select an image file.');return;}
  const reader=new FileReader();
  reader.onload=ev=>{
    pendingImage=ev.target.result;
    const mm=ev.target.result.match(/data:([^;]+);/);
    pendingMime=mm?mm[1]:'image/jpeg';
    pendingB64=ev.target.result.split(',')[1];
    scanStatus=null; render();
    if(apiKey) scanWithAI();
    else{scanStatus={type:'warn',msg:'No API key — fill details manually or tap ⚙ API to enable scanning.'};render();}
  };
  reader.readAsDataURL(file);
  e.target.value='';
}

// ── AI Scan ────────────────────────────────────────────────────────
function capForm() {
  editForm.store    = document.getElementById('f-store')?.value    ?? editForm.store;
  editForm.date     = document.getElementById('f-date')?.value     ?? editForm.date;
  editForm.amount   = document.getElementById('f-amount')?.value   ?? editForm.amount;
  editForm.category = document.getElementById('f-category')?.value ?? editForm.category;
  editForm.notes    = document.getElementById('f-notes')?.value    ?? editForm.notes;
}
async function scanWithAI() {
  capForm();
  if(!pendingB64||!apiKey) return;
  scanStatus={type:'scanning',msg:'AI is reading your receipt…'}; render();
  try {
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-opus-4-5',max_tokens:512,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:pendingMime,data:pendingB64}},
          {type:'text',text:`You are an OCR assistant. Look at this receipt and extract:
1. store_name: the business or store name
2. date: transaction date in YYYY-MM-DD format
3. total: the final total as a plain number (no $ or commas)
Respond ONLY with raw JSON, no markdown, no extra text:
{"store_name":"","date":"","total":""}`}
        ]}]
      })
    });
    if(!resp.ok){
      const err=await resp.json().catch(()=>({}));
      scanStatus=resp.status===401
        ?{type:'error',msg:'Invalid API key (401). Check your key in ⚙ API settings.'}
        :{type:'error',msg:`API error ${resp.status}: ${err?.error?.message||''}`};
      render();return;
    }
    const data=await resp.json();
    const raw=(data.content||[]).map(c=>c.text||'').join('').trim();
    let parsed;
    try{parsed=JSON.parse(raw.replace(/```json|```/g,'').trim());}
    catch{scanStatus={type:'error',msg:`Could not parse response: "${raw.slice(0,80)}"`};render();return;}
    const filled=[];
    if(parsed.store_name){editForm.store=parsed.store_name;filled.push('store');}
    if(parsed.date&&/\d{4}-\d{2}-\d{2}/.test(parsed.date)){editForm.date=parsed.date;filled.push('date');}
    if(parsed.total&&!isNaN(parseFloat(parsed.total))){editForm.amount=parseFloat(parsed.total).toFixed(2);filled.push('amount');}
    scanStatus=filled.length
      ?{type:'success',msg:`✓ AI filled in: ${filled.join(', ')}. Review and save below.`}
      :{type:'warn',msg:'AI could not read clear data. Please fill in manually.'};
  } catch(err) {
    scanStatus={type:'error',msg:err.message.includes('fetch')?'Network error — check connection.':'Error: '+err.message};
  }
  render();
}

// ── Save / Delete ──────────────────────────────────────────────────
async function doSave() {
  capForm();
  const {store,date,amount,category,notes}=editForm;
  if(!amount||isNaN(parseFloat(amount))){alert('Please enter a valid amount.');return;}
  const parsedAmount=parseFloat(amount);

  // Duplicate detection — match on date + amount, and optionally store name
  const duplicates=receipts.filter(r=>{
    const sameDate = r.date && date && r.date===date;
    const sameAmount = Math.abs(parseFloat(r.amount||0)-parsedAmount)<0.01;
    const sameStore = store && r.store && r.store.trim().toLowerCase()===store.trim().toLowerCase();
    // Flag if same date+amount, or same date+store+amount
    return sameDate && sameAmount || (sameStore && sameAmount);
  });

  if(duplicates.length>0){
    const d=duplicates[0];
    const msg=`A possible duplicate was found:

`+
      `  Store:  ${d.store||'Unknown'}
`+
      `  Date:   ${d.date||'—'}
`+
      `  Amount: $${parseFloat(d.amount).toFixed(2)}

`+
      `Save anyway?`;
    if(!confirm(msg)) return;
  }

  const r={id:Date.now().toString(),store:store||'',date,amount:parsedAmount,category,notes,image:pendingImage||null,createdAt:new Date().toISOString()};
  await persistReceipt(r);
  pendingImage=null;pendingB64=null;scanStatus=null;
  editForm={store:'',date:'',amount:'',category:'Fuel',notes:''};
  showTab('receipts');
}
function setFilter(f){currentFilter=f;render();}
function viewReceipt(id) {
  const r=receipts.find(x=>x.id===id); if(!r) return;
  const ov=document.createElement('div'); ov.className='overlay';
  ov.innerHTML=`<div class="modal">
    <div class="mhead"><div class="mtitle">${esc(r.store||'Receipt')}</div><button class="mclose" onclick="this.closest('.overlay').remove()">✕</button></div>
    ${r.image?`<img class="mimg" src="${r.image}" alt="Receipt">`:''}
    <div class="mrow"><span class="mlabel">Amount</span><span class="mval" style="color:var(--accent);font-size:20px">${fmt(r.amount)}</span></div>
    <div class="mrow"><span class="mlabel">Date</span><span class="mval">${r.date||'—'}</span></div>
    <div class="mrow"><span class="mlabel">Category</span><span class="mval"><span class="badge ${r.category}">${r.category}</span></span></div>
    ${r.notes?`<div class="mrow"><span class="mlabel">Notes</span><span class="mval">${esc(r.notes)}</span></div>`:''}
    <div class="mrow"><span class="mlabel">Added</span><span class="mval">${new Date(r.createdAt).toLocaleDateString()}</span></div>
    <button class="btn btn-d btn-full" style="margin-top:13px" onclick="doDelete('${r.id}',this)">Delete Receipt</button>
  </div>`;
  ov.onclick=e=>{if(e.target===ov)ov.remove();};
  document.body.appendChild(ov);
}
async function doDelete(id,btn) {
  if(!confirm('Delete this receipt?')) return;
  await removeReceipt(id);
  btn.closest('.overlay').remove(); render();
}

// ── API Key ────────────────────────────────────────────────────────
function showApiSetup() {
  const ov=document.createElement('div'); ov.className='overlay';
  ov.innerHTML=`<div class="modal">
    <div class="mhead"><div class="mtitle">⚙ API Key Setup</div><button class="mclose" onclick="this.closest('.overlay').remove()">✕</button></div>
    <p style="font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:8px">Enter your Anthropic API key to enable AI receipt scanning. Stored in IndexedDB on this device only.</p>
    <p style="font-size:13px;color:var(--text2);margin-bottom:13px">Get yours at <a href="https://console.anthropic.com/settings/keys" target="_blank" style="color:var(--info)">console.anthropic.com → API Keys</a></p>
    <label class="fl">API Key (starts with sk-ant-)</label>
    <div class="keyrow">
      <input class="fi" id="api-in" type="password" placeholder="sk-ant-api03-…" value="${apiKey}">
      <button class="btn btn-p" onclick="applyKey()">Save</button>
    </div>
    ${apiKey?`<div style="color:var(--accent);font-size:12px;margin-top:8px">✓ Key saved (${apiKey.slice(0,14)}…)</div>
    <button class="btn btn-d btn-full" style="margin-top:10px" onclick="clearKey()">Remove Key</button>`:''}
    <div class="divider"></div>
    <p style="font-size:12px;color:var(--text3);line-height:1.5">Cost: ~$0.01–0.03 per scan. New accounts receive free credits.</p>
  </div>`;
  ov.onclick=e=>{if(e.target===ov)ov.remove();};
  document.body.appendChild(ov);
}
async function applyKey() {
  const v=document.getElementById('api-in')?.value?.trim();
  if(!v){alert('Please paste your API key.');return;}
  if(!v.startsWith('sk-')){alert('Key should start with "sk-ant-". Please check and retry.');return;}
  await storeKey(v);
  document.querySelector('.overlay')?.remove(); render();
  alert('✓ API key saved! Upload a receipt to test AI scanning.');
}
async function clearKey() {
  if(!confirm('Remove API key from this device?')) return;
  await storeKey('');
  document.querySelector('.overlay')?.remove(); render();
}

// ── Backup / Restore ───────────────────────────────────────────────
function showBackup() {
  const ov=document.createElement('div'); ov.className='overlay';
  ov.innerHTML=`<div class="modal">
    <div class="mhead"><div class="mtitle">☁ Backup & Restore</div><button class="mclose" onclick="this.closest('.overlay').remove()">✕</button></div>
    <p style="font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:13px">Export a backup to keep a copy or move data to another device. Your API key is not included in backups.</p>
    <div class="bkrow">
      <button class="btn btn-s" onclick="doExport()">⬇ Export Backup</button>
      <button class="btn btn-s" onclick="document.getElementById('import-input').click()">⬆ Import Backup</button>
    </div>
    <div class="divider"></div>
    <p style="font-size:12px;color:var(--text3);line-height:1.5"><strong>iPhone tip:</strong> Add to Home Screen via Safari (Share → Add to Home Screen) for the most reliable storage. Back up regularly to iCloud Drive or Google Drive.</p>
  </div>`;
  ov.onclick=e=>{if(e.target===ov)ov.remove();};
  document.body.appendChild(ov);
}
function doExport() {
  const blob=new Blob([JSON.stringify({version:2,exported:new Date().toISOString(),receipts},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=`receipttrack_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
}
async function onImport(e) {
  const file=e.target.files[0]; if(!file) return;
  let data; try{data=JSON.parse(await file.text());}catch{alert('Invalid backup file.');return;}
  if(!data.receipts||!Array.isArray(data.receipts)){alert('Not a valid ReceiptTrack backup.');return;}
  if(!confirm(`Import ${data.receipts.length} receipts? New ones will be merged with your existing ${receipts.length}.`)) return;
  const existing=new Set(receipts.map(r=>r.id));
  const newOnes=data.receipts.filter(r=>!existing.has(r.id));
  for(const r of newOnes){try{await dbPut('receipts',r);}catch(e){}}
  receipts=[...receipts,...newOnes].sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0));
  lsBak();
  document.querySelector('.overlay')?.remove(); render();
  alert(`✓ Imported ${newOnes.length} new receipts.`);
  e.target.value='';
}

// ── Excel Export ───────────────────────────────────────────────────
function exportToExcel() {
  if(!receipts.length){alert('No receipts to export yet.');return;}
  const rows=receipts.map(r=>({Date:r.date||'',Store:r.store||'',Amount:parseFloat(r.amount||0),Category:r.category||'',Notes:r.notes||'','Has Photo':r.image?'Yes':'No',Added:new Date(r.createdAt).toLocaleDateString()}));
  rows.push({},{Date:'',Store:'GRAND TOTAL',Amount:parseFloat(sum(receipts).toFixed(2)),Category:'',Notes:'','Has Photo':'',Added:''});
  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[12,26,12,14,26,10,14].map(w=>({wch:w}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'All Receipts');
  CATS.forEach(cat=>{
    const cr=receipts.filter(r=>r.category===cat).map(r=>({Date:r.date||'',Store:r.store||'',Amount:parseFloat(r.amount||0),Notes:r.notes||''}));
    if(cr.length){cr.push({},{Date:'',Store:'TOTAL',Amount:parseFloat(sum(receipts.filter(r=>r.category===cat)).toFixed(2)),Notes:''});XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(cr),cat);}
  });
  XLSX.writeFile(wb,`ReceiptTrack_${new Date().toISOString().slice(0,10)}.xlsx`);
}

// ── Install Help ───────────────────────────────────────────────────
function showInstallHelp() {
  document.getElementById('install-banner').classList.add('hidden');
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  alert(isIOS
    ?'On iPhone/iPad:\n1. Open this page in Safari (not Chrome)\n2. Tap the Share button (□ with arrow) at the bottom\n3. Scroll down and tap "Add to Home Screen"\n4. Tap "Add"\n\nOnce installed, your data will persist reliably.'
    :'On Android:\n1. Tap the three-dot menu in Chrome\n2. Tap "Add to Home Screen"\n3. Tap "Add"');
}

init();
</script>
